name = "reagraph-website"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static HTML export produced by `pnpm build` (`output: 'export'` in next.config.ts).
pages_build_output_dir = "out"

[vars]
NODE_ENV = "production"
# Cloudflare applies the [vars] above to the BUILD environment too, and
# `NODE_ENV=production` makes `pnpm install` skip devDependencies — which breaks
# the build (no typescript/tailwind/pagefind/@svgr). This override forces pnpm to
# install devDependencies anyway, so the build keeps working while the deployed
# worker still gets NODE_ENV=production at runtime.
NPM_CONFIG_PRODUCTION = "false"
